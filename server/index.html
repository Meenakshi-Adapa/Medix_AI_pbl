<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Diagnosis System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- Improved Professional Styling --- */
        :root {
            --primary-color: #3949ab;
            --primary-hover: #283593;
            --background-color: #f4f4f9;
            --card-background: #ffffff;
            --text-color: #333;
            --heading-color: #1a237e;
            --results-background: #e8eaf6;
            --border-color: #ccc;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 2em;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-background);
            padding: 2.5em;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            color: var(--heading-color);
            margin-top: 0;
            text-align: center;
        }

        p {
            text-align: center;
            margin-bottom: 2em;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            margin-bottom: 1em;
            box-sizing: border-box;
            font-size: 1em;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(57, 73, 171, 0.2);
        }

        button {
            width: 100%;
            padding: 12px 15px;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #results {
            margin-top: 2em;
            padding: 1.5em;
            background-color: var(--results-background);
            border-radius: 8px;
            min-height: 50px;
        }
        
        #results h2 {
            margin-top: 0;
        }

        ul {
            padding-left: 20px;
        }
        
        li {
            margin-bottom: 0.5em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Medical Diagnosis System</h1>
        <p>Enter symptoms separated by a comma and press Enter or click the button.</p>

        <input type="text" id="symptomsInput" placeholder="e.g., fever, cough, headache">
        <button onclick="getDiagnosis()">Get Diagnosis</button>

        <div id="results">
            <!-- Diagnosis results will be displayed here -->
        </div>
    </div>

    <script>
        const inputElement = document.getElementById('symptomsInput');
        
        // --- Improved Feature: Allow pressing "Enter" to diagnose ---
        inputElement.addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                getDiagnosis();
            }
        });

        async function getDiagnosis() {
            const resultsElement = document.getElementById('results');
            resultsElement.innerHTML = '<i>Diagnosing...</i>';

            const symptoms = inputElement.value.split(',')
                .map(s => s.trim().toLowerCase())
                .filter(s => s); // Filter out empty strings

            if (symptoms.length === 0) {
                resultsElement.innerHTML = '<p>Please enter at least one symptom.</p>';
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/diagnose', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: symptoms }),
                });

                const data = await response.json();
                
                let html = '<h2>Results</h2>';
                let resultsFound = false;

                if (data.exact && data.exact.length > 0) {
                    resultsFound = true;
                    html += `<p><b>Exact Diagnosis:</b> ${data.exact.join(', ')}</p>`;
                }
                
                if (data.partial && data.partial.length > 0) {
                    resultsFound = true;
                    html += `<p><b>Possible Diagnoses (Partial Match):</b></p><ul>`;
                    data.partial.forEach(match => {
                        html += `<li>${match.disease} (${match.match_count} matching symptoms)</li>`;
                    });
                    html += '</ul>';
                }

                if (!resultsFound) {
                    html += '<p>No diagnosis could be determined from the symptoms provided.</p>';
                }
                resultsElement.innerHTML = html;

            } catch (error) {
                resultsElement.innerHTML = '<p style="color: red;">Error: Could not connect to the diagnosis server.</p>';
                console.error('API Error:', error);
            }
        }
    </script>
</body>
</html>
